<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My CinemaOS Shield App</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #020617;
        }
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .iframe-wrapper {
            flex-grow: 1;
            position: relative;
            width: 100%;
            height: 100%;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="bg-slate-900 border-b border-slate-800 px-3 py-2 flex justify-between items-center z-10 shadow-lg">
            <div class="flex items-center gap-1.5">
                <span class="text-xs font-bold text-red-500 tracking-wider flex items-center gap-1">
                    🎬 CINEMAOS <span class="bg-emerald-600 text-white text-[9px] px-1 py-0.2 rounded font-normal">SHIELD ACTIVE</span>
                </span>
            </div>
            
            <div class="flex gap-1.5">
                <button onclick="toggleFullScreen()" class="bg-red-600 hover:bg-red-700 text-white text-xs font-medium px-2.5 py-1.5 rounded-md cursor-pointer transition-colors">
                    📺 Screen အပြည့်ကြည့်ရန်
                </button>
                <button onclick="goHome()" class="bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs font-medium px-2 py-1.5 rounded-md border border-slate-700 cursor-pointer">
                    🏠 Home
                </button>
                <button onclick="refreshPage()" class="bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs font-medium px-2 py-1.5 rounded-md border border-slate-700 cursor-pointer">
                    🔄 Refresh
                </button>
            </div>
        </div>

        <div class="iframe-wrapper" id="fullscreenContainer" onclick="showButtonTemporarily()">
            
            <button id="floatingCloseBtn" onclick="event.stopPropagation(); toggleFullScreen();" 
                    class="hidden fixed top-4 left-4 z-50 bg-red-600 hover:bg-red-700 text-white text-xs font-bold px-3 py-2 rounded-lg shadow-2xl border border-red-500 opacity-90 transition-opacity duration-300 cursor-pointer">
                ❌ Full Screen မှ ထွက်ရန်
            </button>

            <iframe 
                id="cinemaOSFrame"
                src="https://cinemaos.live" 
                title="CinemaOS Shielded Frame"
                sandbox="allow-scripts allow-same-origin allow-forms"
                allowfullscreen>
            </iframe>
        </div>
    </div>

    <script>
        const iframe = document.getElementById('cinemaOSFrame');
        const container = document.getElementById('fullscreenContainer');
        const floatBtn = document.getElementById('floatingCloseBtn');
        let hideTimeout;

        function goHome() {
            iframe.src = "https://cinemaos.live";
        }

        function refreshPage() {
            const currentSrc = iframe.src;
            iframe.src = '';
            iframe.src = currentSrc;
        }

        // Full Screen အဖွင့်/အပိတ်
        function toggleFullScreen() {
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                if (container.requestFullscreen) {
                    container.requestFullscreen();
                } else if (container.webkitRequestFullscreen) { 
                    container.webkitRequestFullscreen();
                }
                if (screen.orientation && screen.orientation.lock) {
                    screen.orientation.lock('landscape').catch(err => console.log(err));
                }
                
                // Full screen စဝင်ချင်း ခလုတ်ကို လှမ်းပြပြီး Reset လုပ်မယ်
                floatBtn.classList.remove('hidden');
                resetHideTimeout();
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                }
                if (screen.orientation && screen.orientation.unlock) {
                    screen.orientation.unlock();
                }
                
                clearTimeout(hideTimeout);
                floatBtn.classList.add('hidden');
            }
        }

        // ၅ စက္ကန့်ပြည့်ရင် အလိုအလျောက် ပြန်ဖျောက်မည့် စနစ်
        function resetHideTimeout() {
            clearTimeout(hideTimeout);
            floatBtn.style.opacity = "1";
            
            hideTimeout = setTimeout(() => {
                const isFS = document.fullscreenElement || document.webkitFullscreenElement;
                if (isFS) {
                    floatBtn.style.opacity = "0";
                    // Transition သက်ရောက်မှုပြီးမှ လုံးဝကွယ်သွားအောင် ခဏစောင့်ပြီး hidden လုပ်ခြင်း
                    setTimeout(() => { 
                        if(floatBtn.style.opacity === "0") floatBtn.classList.add('hidden'); 
                    }, 300);
                }
            }, 5000); // ၅ စက္ကန့် (5000ms) ထားထားပါသည်
        }

        // ဖုန်းစခရင်ကို တစ်ချက်နှိပ်လိုက်လျှင် ခလုတ်ပြန်ပေါ်လာစေရန်
        function showButtonTemporarily() {
            const isFS = document.fullscreenElement || document.webkitFullscreenElement;
            if (isFS) {
                floatBtn.classList.remove('hidden');
                resetHideTimeout();
            }
        }

        // Back button ကြောင့် ထွက်သွားလျှင် ခလုတ် ပြန်သိမ်းရန်
        function checkFsChange() {
            const isFS = document.fullscreenElement || document.webkitFullscreenElement;
            if (!isFS) {
                clearTimeout(hideTimeout);
                floatBtn.classList.add('hidden');
            }
        }

        document.addEventListener('fullscreenchange', checkFsChange);
        document.addEventListener('webkitfullscreenchange', checkFsChange);
    </script>
</body>
</html>
